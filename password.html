<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>输入密码 - Clodesen</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .password-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        
        .password-container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        .password-container h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }
        
        .password-container p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 5px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
        
        .message {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .message.success {
            background: #d1fae5;
            color: #065f46;
            display: block;
        }
        
        .message.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
    </style>
</head>
<body>
    <div class="password-page">
        <div class="password-container">
            <h1>🔐 输入访问密码</h1>
            <p>请输入从视频中获取的两个中文字密码</p>
            
            <form id="passwordForm">
                <div class="input-group">
                    <label for="password">访问密码</label>
                    <input type="text" id="password" name="password" placeholder="请输入两个中文字" maxlength="2" required>
                </div>
                
                <button type="submit" class="submit-btn">验证密码</button>
            </form>
            
            <div id="message" class="message"></div>
            
            <a href="index.html" class="back-link">← 返回教程页面</a>
        </div>
    </div>

    <script>
        document.getElementById('passwordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const messageDiv = document.getElementById('message');
            
            // 这里可以添加密码验证逻辑
            // 示例：检查密码是否为两个中文字
            const chineseRegex = /^[\u4e00-\u9fa5]{2}$/;
            
            if (chineseRegex.test(password)) {
                messageDiv.textContent = '✓ 密码验证成功！正在跳转...';
                messageDiv.className = 'message success';
                
                // 模拟跳转
                setTimeout(() => {
                    // 这里可以跳转到实际的AI页面
                    alert('密码正确！欢迎使用 Clodesen AI');
                }, 1500);
            } else {
                messageDiv.textContent = '✗ 请输入正确的两个中文字密码';
                messageDiv.className = 'message error';
            }
        });
    </script>
</body>
</html>
