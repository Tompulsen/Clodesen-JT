<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clodesen - 访问密码获取教程</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Clodesen 访问密码获取教程</h1>
            <p class="subtitle">为了防止恶意刷Toker（访问码每日会更新！）</p>
        </div>
    </header>

    <main>
        <div class="tutorial-container">
            <!-- 教程内容 -->
            <div class="tutorial-content">
                <!-- 整体流程概览 -->
                <section id="step1" class="module">
                    <div class="module-header">
                        <h2>访问密码获取流程</h2>
                    </div>
                    <div class="module-body">
                        <p>按照以下步骤获取 AI 访问密码：</p>
                        <div class="steps-list">
                            <div class="step-item">
                                <span class="step-num">1</span>
                                <p><strong>下载UC浏览器</strong> - 在手机应用商店搜索"UC浏览器"并下载安装</p>
                            </div>
                            <div class="step-item">
                                <span class="step-num">2</span>
                    
                                <p><strong>获取密码</strong> - 点击下方的获取密码选项 <strong>"转存“密钥”文件夹到本地网盘，听取文件夹中的音频获取"</strong></p>
                            </div>
                        
                        </div>
                        
                        <div class="password-input-section">
                            <a href="https://drive.uc.cn/s/ce72cf6ce3ae4?public=1" class="password-btn">获取密码</a>
                            <a href="https://pai.zaiduyu.top/#/auth" class="password-btn">已获取密码点击输入密码</a>
                        </div>

                        <div class="tip-box">
                            <span class="tip-icon">💡</span>
                            <p><strong>提示：</strong>在音频中所提示的密码就是今天的访问密码，请保存到网盘中听取！</p>
                        </div>
                    </div>
                </section>


            </div>
        </div>
    </main>
